<div xmlns:th="http://www.thymeleaf.org">
  <h1 style="margin:0 0 18px;font-size:22px;font-weight:700;color:#111827;">Your account has been reactivated</h1>
  <p style="margin:0 0 12px;font-size:16px;color:#374151;">Hello <span th:text="${firstName}">Client</span>,</p>
  <p style="margin:0 0 16px;font-size:16px;line-height:1.55;color:#374151;">
    We are pleased to let you know that your <strong th:text="${brandName}">NHCWash</strong> account has been successfully reactivated by our team.
  </p>
  <p style="margin:0 0 16px;font-size:16px;line-height:1.55;color:#374151;">
    You can sign in again to view your order history and place new orders.
  </p>
  <p style="margin:0 0 28px;font-size:16px;line-height:1.55;color:#374151;">
    We are delighted to welcome you back!
  </p>
  <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:10px 0;">
        <a th:href="${loginUrl}"
           style="display:inline-block;background:#0284c7;color:#ffffff !important;font-size:16px;font-weight:600;text-decoration:none;border-radius:8px;padding:14px 28px;">
          Log in to my account
        </a>
      </td>
    </tr>
  </table>
  <p style="margin:20px 0 0;font-size:13px;color:#6b7280;text-align:center;word-break:break-all;">
    <a th:href="${loginUrl}" th:text="${loginUrl}" style="color:#0284c7;">Link</a>
  </p>
</div>
