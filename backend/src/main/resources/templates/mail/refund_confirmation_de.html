<div xmlns:th="http://www.thymeleaf.org">
  <h1 style="margin:0 0 18px;font-size:22px;font-weight:700;color:#111827;">Rückerstattung Ihrer Bestellung</h1>
  <p style="margin:0 0 12px;font-size:16px;color:#374151;">Hallo <span th:text="${firstName}">Kunde</span>,</p>
  <p style="margin:0 0 16px;font-size:16px;line-height:1.55;color:#374151;">
    Wir bestätigen eine Rückerstattung von <strong th:text="${refundAmount}">0,00 €</strong> für die Bestellung <strong th:text="${orderRef}">CMD-000</strong>.
  </p>
  <p style="margin:0;font-size:15px;line-height:1.55;color:#4b5563;">
    Bei Kartenzahlungen kann es je nach Bank einige Werktage dauern, bis der Betrag auf Ihrem Kontoauszug sichtbar ist.
  </p>
  <p style="margin:16px 0 0;font-size:15px;color:#374151;">Mit freundlichen Grüßen,<br/><span th:text="${brandName}">NHCWash</span></p>
</div>
