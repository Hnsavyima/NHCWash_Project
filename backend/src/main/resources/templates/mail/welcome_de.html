<div xmlns:th="http://www.thymeleaf.org">
  <h1 style="margin:0 0 18px;font-size:22px;font-weight:700;color:#111827;">
    Willkommen bei <span th:text="${brandName}">NHCWash</span>
  </h1>
  <p style="margin:0 0 16px;font-size:16px;color:#374151;">Hallo <span th:text="${firstName}">Kunde</span>,</p>
  <p style="margin:0 0 28px;font-size:16px;line-height:1.55;color:#374151;">
    Ihr Konto wurde erfolgreich erstellt. Sie können jetzt Services buchen und Ihre Bestellungen online verfolgen.
  </p>
  <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:10px 0;">
        <a th:href="${loginUrl}"
           style="display:inline-block;background:#0284c7;color:#ffffff !important;font-size:16px;font-weight:600;text-decoration:none;border-radius:8px;padding:14px 28px;">
          Anmelden
        </a>
      </td>
    </tr>
  </table>
  <p style="margin:20px 0 0;font-size:13px;color:#6b7280;text-align:center;word-break:break-all;">
    <a th:href="${loginUrl}" th:text="${loginUrl}" style="color:#0284c7;">Link</a>
  </p>
</div>
