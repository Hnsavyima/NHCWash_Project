# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/nhcwash?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Port de l'application
server.port=8080

# JWT Configuration (dev — remplacer le secret en production par une valeur forte et externe)
nhcwash.app.jwtSecret=nhcwashDevJwtSecretKeyMustBeAtLeast256BitsLongForHmacSha256Algorithm
nhcwash.app.jwtExpirationMs=86400000